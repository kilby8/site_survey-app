<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolarPro Admin • Home</title>
    <style>
      :root {
        --bg: #070b14;
        --card: #101a2e;
        --line: rgba(148, 163, 184, 0.25);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --primary: #22d3ee;
        --primary-2: #06b6d4;
        --danger: #ef4444;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 15% -10%, rgba(34, 211, 238, 0.22), transparent 42%),
          radial-gradient(circle at 90% 0%, rgba(167, 139, 250, 0.2), transparent 40%),
          linear-gradient(180deg, #060a13 0%, #090f1f 45%, #070b14 100%);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 34px; }
      .hero { margin-bottom: 14px; }
      .hero h1 { margin: 0; font-size: clamp(1.4rem, 2.8vw, 2.1rem); }
      .hero p { margin: 8px 0 0; color: var(--muted); }
      .hero-actions { margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap; }
      .hero-actions .btn-link {
        border: none;
        background: linear-gradient(90deg, var(--primary), var(--primary-2));
        color: #022c3a;
        font-weight: 800;
        min-height: 40px;
        padding: 10px 12px;
        border-radius: 10px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: linear-gradient(180deg, rgba(16, 26, 46, 0.96), rgba(15, 32, 62, 0.94));
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }

      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

      input, button, a.btn {
        border-radius: 10px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        padding: 10px 12px;
        font-size: 14px;
      }

      input {
        background: rgba(15, 23, 42, 0.75);
        color: var(--text);
        min-height: 42px;
        flex: 1;
        min-width: 220px;
      }

      button, a.btn {
        border: none;
        background: linear-gradient(90deg, var(--primary), var(--primary-2));
        color: #022c3a;
        font-weight: 800;
        min-height: 42px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .btn-danger { background: linear-gradient(90deg, #f87171, var(--danger)); color: #fff; }
      .hidden { display: none !important; }
      .msg { min-height: 22px; margin-top: 8px; font-size: 13px; }
      .msg.error { color: #fca5a5; }
      .msg.ok { color: #86efac; }
      .muted { color: var(--muted); }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 8px; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <h1>SolarPro Admin Home</h1>
        <p>Sign in once, then launch the tools you need.</p>
        <div class="hero-actions">
          <a class="btn-link" href="https://solar-pro.app/" target="_blank" rel="noopener noreferrer">
            Open Main Login Page
          </a>
        </div>
      </section>

      <section class="card" id="authCard">
        <h2 style="margin:0; font-size:1.1rem;">Admin Sign In</h2>
        <p class="muted" style="margin:8px 0 12px;">Use your SolarPro website/admin credentials to open dashboards.</p>
        <div class="row">
          <input id="identifier" placeholder="Email or username" autocomplete="username" />
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button id="signInBtn">Enter Admin Home</button>
        </div>
        <div class="msg" id="authMsg"></div>
      </section>

      <section class="card hidden" id="homeCard">
        <div class="row" style="justify-content:space-between;">
          <strong id="whoami">Admin</strong>
          <button id="signOutBtn" class="btn-danger">Sign out</button>
        </div>

        <div class="grid">
          <a class="btn" href="/tools/map-simulator">Map Simulator</a>
          <a class="btn" href="/admin/bug-reports">Bug Reports Dashboard</a>
          <a class="btn" href="/admin/surveys">Surveys Dashboard</a>
        </div>

        <div class="msg" id="homeMsg"></div>
      </section>
    </div>

    <script>
      const authCard = document.getElementById('authCard');
      const homeCard = document.getElementById('homeCard');
      const authMsg = document.getElementById('authMsg');
      const homeMsg = document.getElementById('homeMsg');
      const whoamiEl = document.getElementById('whoami');

      function setMsg(el, text, isError = false) {
        el.textContent = text || '';
        el.className = 'msg ' + (text ? (isError ? 'error' : 'ok') : '');
      }

      function getToken() { return localStorage.getItem('admin_home_token'); }
      function setToken(token) { localStorage.setItem('admin_home_token', token); }
      function clearToken() { localStorage.removeItem('admin_home_token'); }

      const ADMIN_EMAIL_OVERRIDES = new Set(['carpenterjames88@gmail.com', 'carpj88@outlook.com']);
      function cleanEmail(email) { return String(email || '').trim().toLowerCase(); }
      function isAdminLikeUser(user) {
        return user?.role === 'admin' || ADMIN_EMAIL_OVERRIDES.has(cleanEmail(user?.email));
      }

      function showHomeUI() {
        authCard.classList.add('hidden');
        homeCard.classList.remove('hidden');
      }

      function showAuthUI() {
        authCard.classList.remove('hidden');
        homeCard.classList.add('hidden');
      }

      async function signIn() {
        setMsg(authMsg, 'Authenticating...');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;

        const res = await fetch('/api/users/signin', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });

        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || 'Sign in failed');
        if (!isAdminLikeUser(body.user)) throw new Error('Admin account required');

        setToken(body.token);
        whoamiEl.textContent = body.user.email || body.user.fullName || 'Admin';
        setMsg(authMsg, 'Access granted');
        setMsg(homeMsg, 'Choose a destination');
        showHomeUI();
      }

      document.getElementById('signInBtn').addEventListener('click', () => {
        signIn().catch((err) => setMsg(authMsg, err.message || 'Sign in failed', true));
      });

      document.getElementById('signOutBtn').addEventListener('click', () => {
        clearToken();
        showAuthUI();
        setMsg(authMsg, 'Signed out');
      });

      if (getToken()) {
        showHomeUI();
      }
    </script>
  </body>
</html>

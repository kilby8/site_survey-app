<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolarPro Site Survey</title>
    <style>
      :root {
        --bg-deep: #070b14;
        --bg-mid: #0f172a;
        --card: rgba(15, 23, 42, 0.9);
        --line: rgba(148, 163, 184, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --brand-primary: #f39c12;
        --brand-primary-hover: #d68910;
        --brand-secondary: #22d3ee;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px 16px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 15% -10%, rgba(243, 156, 18, 0.22), transparent 44%),
          radial-gradient(circle at 88% 2%, rgba(34, 211, 238, 0.16), transparent 36%),
          linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 100%);
        color: var(--text);
      }

      .card {
        width: min(760px, 100%);
        border-radius: 18px;
        padding: 34px 24px;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.82));
        box-shadow:
          0 20px 44px rgba(2, 6, 23, 0.55),
          0 0 0 1px rgba(243, 156, 18, 0.12);
        text-align: center;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid rgba(243, 156, 18, 0.4);
        background: rgba(243, 156, 18, 0.15);
        color: #f8c471;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--brand-secondary);
        box-shadow: 0 0 0 6px rgba(34, 211, 238, 0.14);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.9rem, 3.5vw, 2.75rem);
        line-height: 1.1;
      }

      p {
        margin: 0 auto 24px;
        max-width: 54ch;
        line-height: 1.55;
        color: var(--muted);
        font-size: 1.03rem;
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 12px 20px;
        border-radius: 10px;
        border: 1px solid transparent;
        font-weight: 800;
        font-size: 1rem;
        text-decoration: none;
        transition: transform 0.18s ease, filter 0.18s ease, border-color 0.18s ease;
      }

      .btn--primary {
        background: linear-gradient(90deg, var(--brand-primary), var(--brand-primary-hover));
        color: #1f2937;
      }

      .btn--secondary {
        background: rgba(15, 23, 42, 0.62);
        border-color: rgba(34, 211, 238, 0.38);
        color: #bae6fd;
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      .meta {
        margin-top: 18px;
        font-size: 12px;
        color: #7c8da8;
      }

      @media (max-width: 560px) {
        .card { padding: 28px 18px; }
        .btn-row { flex-direction: column; }
        .btn { width: 100%; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="badge"><span class="badge-dot" aria-hidden="true"></span>SolarPro</div>
      <h1>SolarPro Site Survey App</h1>
      <p>Professional roof and electrical assessments with fast field capture, streamlined pipeline visibility, and real-time team coordination.</p>
      <div class="btn-row">
        <a class="btn btn--primary" href="https://expo.dev/@kilby/site-survey-app">
          Download the App
        </a>
        <a class="btn btn--secondary" href="/admin/home">
          Admin Home Login
        </a>
      </div>
      <div class="meta">Built for mobile-first field teams · Powered by SolarPro workflows</div>
      <div class="meta">Built by kilby</div>
      <!-- Matthew 5:16 -->
    </main>
  </body>
</html>

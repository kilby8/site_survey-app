<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SolarPro Site Survey</title>
    <style>
      :root {
        --bg: #f4f7f6;
        --text: #2c3e50;
        --accent: #f39c12;
        --accent-hover: #d68910;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 65%);
        color: var(--text);
        text-align: center;
      }

      .card {
        width: min(680px, 100%);
        background: #ffffff;
        border-radius: 16px;
        padding: 36px 28px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 3.5vw, 2.6rem);
      }

      p {
        margin: 0 auto 28px;
        max-width: 48ch;
        line-height: 1.5;
        font-size: 1.05rem;
      }

      .btn {
        display: inline-block;
        background: var(--accent);
        color: #ffffff;
        padding: 14px 24px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 1.05rem;
        text-decoration: none;
        transition:
          background-color 0.2s ease,
          transform 0.2s ease;
      }

      .btn-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      .btn--secondary {
        background: #1f2937;
      }

      .btn:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
      }

      .btn--secondary:hover {
        background: #111827;
      }

      @media (max-width: 520px) {
        .btn-row {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>SolarPro Site Survey App</h1>
      <p>Professional roof and electrical assessments made easy.</p>
      <div class="btn-row">
        <a class="btn" href="https://expo.dev/@kilby/site-survey-app">
          Download the App
        </a>
        <a class="btn btn--secondary" href="/admin/home">
          Admin Home Login
        </a>
      </div>
    </main>
  </body>
</html>
